name: Build Structura

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            label: macOS (Apple Silicon)
            friendly: Apple_Silicon
          - os: macos-14
            target: x86_64-apple-darwin
            label: macOS (Intel)
            friendly: Apple_Intel
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            label: Windows (x64)
            friendly: Windows
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            label: Linux (x64)
            friendly: Linux

    name: ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      # ── Node.js ──────────────────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install Node dependencies
        run: npm ci

      # ── Rust ─────────────────────────────────────────────────────────────────
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      # ── Linux system dependencies ─────────────────────────────────────────────
      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libfuse2 \
            squashfs-tools

      # ── Build ─────────────────────────────────────────────────────────────────
      - name: Build Tauri app
        run: npm run tauri:build
        env:
          TAURI_BUILD_TARGET: ${{ matrix.target }}
          # appimagetool is itself an AppImage; CI runners lack kernel FUSE support,
          # so instruct it to extract-and-run instead of mounting via FUSE.
          APPIMAGE_EXTRACT_AND_RUN: ${{ runner.os == 'Linux' && '1' || '' }}
          # Tauri/macOS code signing — set these secrets in your repo settings.
          # Leave unset for unsigned builds.
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # Tauri updater key (optional)
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      # ── macOS: create DMG ────────────────────────────────────────────────────
      - name: Create DMG (macOS)
        if: runner.os == 'macOS'
        run: npm run tauri:dmg
        env:
          TAURI_BUILD_TARGET: ${{ matrix.target }}

      # ── Rename bundles to user-friendly filenames ────────────────────────────
      - name: Rename macOS DMG
        if: runner.os == 'macOS'
        shell: bash
        run: |
          src=$(ls src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg | head -1)
          mv "$src" "src-tauri/target/${{ matrix.target }}/release/bundle/dmg/Structura_${{ matrix.friendly }}.dmg"

      - name: Rename Windows installer
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $src = Get-ChildItem "src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe" | Select-Object -First 1
          Rename-Item $src.FullName "Structura_${{ matrix.friendly }}.exe"

      - name: Rename Linux AppImage
        if: runner.os == 'Linux'
        shell: bash
        run: |
          src=$(ls src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage | head -1)
          mv "$src" "src-tauri/target/${{ matrix.target }}/release/bundle/appimage/Structura_${{ matrix.friendly }}.AppImage"

      - name: Rename Linux deb
        if: runner.os == 'Linux'
        shell: bash
        run: |
          src=$(ls src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb | head -1)
          mv "$src" "src-tauri/target/${{ matrix.target }}/release/bundle/deb/Structura_${{ matrix.friendly }}.deb"

      # ── Attach to GitHub Release (tag builds only) ───────────────────────────
      # Each platform job uploads its own artifacts directly to the release
      # associated with the tag that triggered this workflow.  softprops will
      # create the release if it does not yet exist, or append files if it does.

      - name: Release macOS DMG
        if: runner.os == 'macOS' && startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: src-tauri/target/${{ matrix.target }}/release/bundle/dmg/Structura_${{ matrix.friendly }}.dmg
          fail_on_unmatched_files: true

      - name: Release Windows installer
        if: runner.os == 'Windows' && startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: src-tauri/target/${{ matrix.target }}/release/bundle/nsis/Structura_${{ matrix.friendly }}.exe
          fail_on_unmatched_files: true

      - name: Release Linux AppImage
        if: runner.os == 'Linux' && startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: src-tauri/target/${{ matrix.target }}/release/bundle/appimage/Structura_${{ matrix.friendly }}.AppImage
          fail_on_unmatched_files: true

      - name: Release Linux deb
        if: runner.os == 'Linux' && startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: src-tauri/target/${{ matrix.target }}/release/bundle/deb/Structura_${{ matrix.friendly }}.deb
          fail_on_unmatched_files: true

      # ── Keep build artifacts for workflow_dispatch runs ───────────────────────
      # When triggered manually (no tag), upload as job artifacts so the binaries
      # are still accessible from the Actions run summary.

      - name: Archive macOS DMG (manual run)
        if: runner.os == 'macOS' && !startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: Structura_${{ matrix.friendly }}
          path: src-tauri/target/${{ matrix.target }}/release/bundle/dmg/Structura_${{ matrix.friendly }}.dmg
          if-no-files-found: error

      - name: Archive Windows installer (manual run)
        if: runner.os == 'Windows' && !startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: Structura_${{ matrix.friendly }}
          path: src-tauri/target/${{ matrix.target }}/release/bundle/nsis/Structura_${{ matrix.friendly }}.exe
          if-no-files-found: error

      - name: Archive Linux AppImage (manual run)
        if: runner.os == 'Linux' && !startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: Structura_${{ matrix.friendly }}_AppImage
          path: src-tauri/target/${{ matrix.target }}/release/bundle/appimage/Structura_${{ matrix.friendly }}.AppImage
          if-no-files-found: error

      - name: Archive Linux deb (manual run)
        if: runner.os == 'Linux' && !startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: Structura_${{ matrix.friendly }}_deb
          path: src-tauri/target/${{ matrix.target }}/release/bundle/deb/Structura_${{ matrix.friendly }}.deb
          if-no-files-found: error
